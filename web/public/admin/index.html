<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Content Manager | Alex Fischman</title>
    <link rel="stylesheet" href="https://unpkg.com/netlify-cms@^2/dist/netlify-cms.css" />
    <link rel="cms-config-url" href="/admin/config.yml" type="text/yaml" />
</head>

<body>
    <script>
      // Listen for OAuth messages from the proxy
      window.addEventListener('message', (event) => {
        const { type, token, error } = event.data || {};
        if (type === 'OAUTH_SUCCESS') {
          window.CMS.authenticate({ token });
        } else if (type === 'OAUTH_ERROR') {
          window.CMS.authError(error);
        }
      });
    </script>
    <script src="https://unpkg.com/netlify-cms@^2/dist/netlify-cms.js"></script>
</body>

</html>
