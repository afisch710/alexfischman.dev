AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket for storing deployment packages and artifacts (for oauth)

Resources:
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: alexfischman-dev-packages
      AccessControl: Private
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldArtifacts
            Status: Enabled
            ExpirationInDays: 30
      VersioningConfiguration:
        Status: Enabled

  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowGitHubActionsUpload
            Effect: Allow
            Principal:
              AWS: 'arn:aws:iam::561338195156:user/github-alexfischman.dev-dev-actions'
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub '${ArtifactBucket.Arn}/*'
              - !Sub '${ArtifactBucket.Arn}'
            Condition:
              StringEquals:
                aws:PrincipalType: IAMUser

Outputs:
  BucketName:
    Description: Name of the artifact bucket
    Value: !Ref ArtifactBucket
    Export:
      Name: alexfischman-dev-packages-bucket-name

  BucketArn:
    Description: ARN of the artifact bucket
    Value: !GetAtt ArtifactBucket.Arn
    Export:
      Name: alexfischman-dev-packages-bucket-arn 