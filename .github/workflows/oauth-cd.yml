name: oauth-cd

on:
  push:
    branches:
      - development
    paths:
      - 'services/oauth/**'
  workflow_dispatch:  # allows manual runs

jobs:
  deploy:
    name: Deploy oauth proxy CloudFormation
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: services/oauth/package.json

      - name: Install dependencies
        working-directory: services/oauth
        run: yarn install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get artifact bucket name
        id: get-bucket
        run: |
          BUCKET_NAME=$(aws cloudformation list-exports \
            --query 'Exports[?Name==`alexfischman-dev-packages-bucket-name`].Value' \
            --output text)
          echo "bucket=$BUCKET_NAME" >> $GITHUB_OUTPUT

      - name: Package Lambda function
        run: |
          cd services/oauth/src
          zip -r ../function.zip .
          aws s3 cp ../function.zip s3://${{ steps.get-bucket.outputs.bucket }}/oauth/function.zip

      - name: Deploy OAuth proxy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --stack-name alexfischman-dev-oauth \
            --template-file services/oauth/cloudformation.yaml \
            --parameter-overrides \
              OAuthClientId=${{ secrets.OAUTH_CLIENT_ID }} \
              OAuthClientSecret=${{ secrets.OAUTH_CLIENT_SECRET }} \
              FunctionS3Key=oauth/function.zip \
              ArtifactBucketName=${{ steps.get-bucket.outputs.bucket }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset
