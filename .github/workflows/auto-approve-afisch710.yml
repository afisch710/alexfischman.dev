# .github/workflows/auto-approve-my-prs.yml
name: Auto-approve my PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

jobs:
  auto_approve:
    if: github.actor == 'afisch710'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.AUTO_APPROVE_PAT }}