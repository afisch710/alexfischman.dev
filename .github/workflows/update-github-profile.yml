# .github/workflows/update-github-profile.yml
name: Refresh GitHub Profile Data

on:
  schedule:
    - cron: '0 8 * * *'    # 2 AM Central Time (08:00 UTC)
  workflow_dispatch:            # allows manual runs too

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PROFILE_UPDATE_TOKEN }}

      - name: Switch to development
        run: |
          git fetch origin development
          git checkout development

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./web
        run: |
          npm install

      - name: Generate GitHub profile data
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_UPDATE_TOKEN }}
          GITHUB_USERNAME: afisch710
          GITHUB_PROFILE_OUTPUT: web/src/data/github-profile.json
        run: |
          chmod +x web/scripts/generate-github-profile.sh
          cd web && ./scripts/generate-github-profile.sh

      - name: Create new branch
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git checkout -b "update/github-profile-$(date +%Y%m%d%H%M)"

      - name: Commit changes
        run: |
          git add web/src/data/github-profile.json
          git diff --cached --quiet || git commit -m "chore: update GitHub profile data [skip ci]"

      - name: Check for changes
        run: |
          # Exit if no new commits relative to development branch
          if git log development..HEAD --oneline | grep .; then
            echo "Changes detected; proceeding with push and PR."
          else
            echo "No changes detected; exiting workflow."
            exit 0
          fi

      - name: Push changes
        run: |
          git push origin "update/github-profile-$(date +%Y%m%d%H%M)"

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_UPDATE_TOKEN }}
        run: |
          # Create the pull request and capture its URL
          PR_URL=$(gh pr create \
            --title "chore: update GitHub profile data" \
            --body "Automated update of GitHub profile statistics" \
            --base development \
            --head "update/github-profile-$(date +%Y%m%d%H%M)")
          echo "Pull request created at $PR_URL"
          
          # Extract the PR number from the URL
          PR_NUMBER="${PR_URL##*/}"
          echo "Pull request number is $PR_NUMBER"
          
          # Enable auto-merge (squash) on the PR
          gh pr merge "$PR_NUMBER" --auto --squash